<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logs a stdout/stderr para que Render los capture
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
